<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mira — deine KI</title>

<!-- Puter.js: gibt der Seite Zugang zu Claude, ohne API-Schlüssel und ohne Server -->
<script src="https://js.puter.com/v2/"></script>

<!-- Schriften -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet">

<!-- Markdown-Rendering (mit Fallback, falls CDN nicht lädt) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

<style>
  :root {
    --bg:        #E9F0EC;
    --bg-deep:   #DCE7E1;
    --surface:   #FBFDFC;
    --ink:       #16302B;
    --ink-soft:  #51685F;
    --ink-faint: #8AA098;
    --primary:   #1E4D44;
    --primary-2: #2C6657;
    --accent:    #ED7B52;
    --accent-2:  #E2683C;
    --accent-soft:#FBE6DA;
    --line:      #CFDED7;
    --line-soft: #DEE9E4;
    --shadow:    0 1px 2px rgba(22,48,43,.04), 0 8px 28px rgba(22,48,43,.06);
    --radius:    18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    font-family: "Inter", system-ui, -apple-system, sans-serif;
    background:
      radial-gradient(1100px 700px at 78% -8%, rgba(237,123,82,.07), transparent 60%),
      radial-gradient(900px 620px at 12% 108%, rgba(30,77,68,.08), transparent 58%),
      var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .app {
    height: 100dvh;
    max-width: 760px;
    margin: 0 auto;
    display: grid;
    grid-template-rows: auto 1fr auto;
  }

  /* ---------- Kopfzeile ---------- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--line-soft);
    background: linear-gradient(180deg, rgba(251,253,252,.85), rgba(251,253,252,.35));
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .sigil {
    width: 38px; height: 38px; border-radius: 50%;
    background: radial-gradient(circle at 32% 30%, var(--primary-2), var(--primary) 75%);
    display: grid; place-items: center;
    box-shadow: 0 4px 12px rgba(30,77,68,.28), inset 0 1px 0 rgba(255,255,255,.18);
    flex-shrink: 0;
  }
  .sigil svg { width: 21px; height: 21px; display: block; }
  .brand-text { line-height: 1; }
  .brand-name {
    font-family: "Fraunces", serif; font-weight: 600; font-size: 21px;
    letter-spacing: -.01em; color: var(--ink);
  }
  .brand-sub { font-size: 11.5px; color: var(--ink-faint); margin-top: 3px; letter-spacing: .02em; }
  .brand-sub b { color: var(--primary-2); font-weight: 600; }

  .reset {
    font-family: "Inter", sans-serif; font-size: 13px; font-weight: 500;
    color: var(--ink-soft); background: var(--surface);
    border: 1px solid var(--line); padding: 8px 14px; border-radius: 999px;
    cursor: pointer; transition: all .18s ease;
    display: inline-flex; align-items: center; gap: 7px;
  }
  .reset:hover { color: var(--primary); border-color: var(--primary); transform: translateY(-1px); }
  .reset svg { width: 14px; height: 14px; }

  /* ---------- Verlauf ---------- */
  .stream { overflow-y: auto; padding: 26px 22px 8px; scroll-behavior: smooth; }
  .stream-inner { display: flex; flex-direction: column; gap: 22px; }

  .row { display: flex; gap: 13px; max-width: 100%; }
  .row.me { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    flex-shrink: 0; display: grid; place-items: center; margin-top: 2px;
  }
  .avatar.ai {
    background: radial-gradient(circle at 32% 30%, var(--primary-2), var(--primary) 78%);
    box-shadow: 0 3px 9px rgba(30,77,68,.24);
  }
  .avatar.ai svg { width: 17px; height: 17px; }
  .avatar.me {
    background: var(--accent-soft); color: var(--accent-2);
    font-weight: 600; font-size: 13px; border: 1px solid #F4D3C3;
  }

  .bubble {
    padding: 13px 17px; border-radius: var(--radius);
    font-size: 15px; line-height: 1.62; max-width: 80%;
    animation: rise .42s cubic-bezier(.2,.7,.3,1) both;
    word-wrap: break-word; overflow-wrap: anywhere; white-space: pre-wrap;
  }
  .row.ai .bubble {
    background: var(--surface); border: 1px solid var(--line-soft);
    border-top-left-radius: 6px; box-shadow: var(--shadow); color: var(--ink);
  }
  .row.me .bubble {
    background: linear-gradient(165deg, var(--primary-2), var(--primary));
    color: #EAF3EF; border-top-right-radius: 6px;
    box-shadow: 0 4px 16px rgba(30,77,68,.22);
  }
  /* sobald Markdown gerendert ist, normalen Textfluss nutzen */
  .row.ai .bubble.rendered { white-space: normal; }

  @keyframes rise { from { opacity: 0; transform: translateY(9px); } to { opacity: 1; transform: translateY(0); } }

  /* Markdown im KI-Text */
  .bubble.rendered p { margin: 0 0 10px; }
  .bubble.rendered p:last-child { margin-bottom: 0; }
  .bubble.rendered h1,.bubble.rendered h2,.bubble.rendered h3 {
    font-family: "Fraunces", serif; font-weight: 600; margin: 14px 0 8px; line-height: 1.25;
  }
  .bubble.rendered h1 { font-size: 19px; } .bubble.rendered h2 { font-size: 17px; } .bubble.rendered h3 { font-size: 15.5px; }
  .bubble.rendered ul,.bubble.rendered ol { margin: 4px 0 11px; padding-left: 21px; }
  .bubble.rendered li { margin: 4px 0; }
  .bubble.rendered strong { font-weight: 600; color: var(--ink); }
  .bubble.rendered a { color: var(--accent-2); text-decoration: underline; text-underline-offset: 2px; }
  .bubble.rendered code {
    font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 13px;
    background: var(--bg-deep); padding: 2px 6px; border-radius: 6px;
  }
  .bubble.rendered pre {
    background: #13241F; color: #D7E6DF; padding: 13px 15px; border-radius: 12px;
    overflow-x: auto; margin: 10px 0; font-size: 13px; line-height: 1.55;
  }
  .bubble.rendered pre code { background: none; padding: 0; color: inherit; }
  .bubble.rendered blockquote {
    border-left: 3px solid var(--accent); padding-left: 13px; color: var(--ink-soft); margin: 9px 0;
  }

  /* Tipp-Cursor beim Streamen */
  .caret {
    display: inline-block; width: 7px; height: 16px; vertical-align: -2px;
    margin-left: 1px; border-radius: 1px; background: var(--primary-2);
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Denk-Indikator */
  .thinking { display: inline-flex; gap: 5px; align-items: center; padding: 4px 2px; }
  .thinking span {
    width: 7px; height: 7px; border-radius: 50%; background: var(--primary-2); opacity: .35;
    animation: breathe 1.25s ease-in-out infinite;
  }
  .thinking span:nth-child(2) { animation-delay: .18s; }
  .thinking span:nth-child(3) { animation-delay: .36s; }
  @keyframes breathe {
    0%,100% { opacity: .3; transform: translateY(0) scale(.85); }
    40%     { opacity: 1;  transform: translateY(-3px) scale(1); }
  }

  /* ---------- Eingabe ---------- */
  footer { padding: 12px 22px 22px; }
  .composer {
    display: flex; align-items: flex-end; gap: 10px;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 22px; padding: 8px 8px 8px 18px; box-shadow: var(--shadow);
    transition: border-color .18s ease, box-shadow .18s ease;
  }
  .composer:focus-within {
    border-color: var(--primary-2);
    box-shadow: 0 0 0 4px rgba(30,77,68,.08), var(--shadow);
  }
  textarea {
    flex: 1; border: none; outline: none; resize: none; background: none;
    font-family: "Inter", sans-serif; font-size: 15px; line-height: 1.5; color: var(--ink);
    max-height: 168px; padding: 8px 0;
  }
  textarea::placeholder { color: var(--ink-faint); }

  .send {
    width: 40px; height: 40px; flex-shrink: 0; border: none; border-radius: 50%;
    background: linear-gradient(160deg, var(--accent), var(--accent-2));
    cursor: pointer; display: grid; place-items: center;
    transition: transform .16s ease, opacity .16s ease, filter .16s ease;
    box-shadow: 0 4px 12px rgba(226,104,60,.32);
  }
  .send svg { width: 19px; height: 19px; }
  .send:hover:not(:disabled) { transform: translateY(-1px) scale(1.04); }
  .send:active:not(:disabled) { transform: scale(.96); }
  .send:disabled { opacity: .4; cursor: not-allowed; box-shadow: none; filter: grayscale(.3); }

  .hint { text-align: center; font-size: 11.5px; color: var(--ink-faint); margin-top: 11px; letter-spacing: .01em; }
  .hint kbd { font-family: inherit; font-size: 10.5px; background: var(--bg-deep); padding: 1.5px 5px; border-radius: 5px; color: var(--ink-soft); }

  .stream::-webkit-scrollbar { width: 9px; }
  .stream::-webkit-scrollbar-thumb { background: var(--line); border-radius: 9px; border: 2px solid transparent; background-clip: padding-box; }
  .stream::-webkit-scrollbar-thumb:hover { background: var(--ink-faint); background-clip: padding-box; }

  @media (max-width: 520px) {
    header { padding: 14px 16px 12px; }
    .stream { padding: 20px 16px 8px; }
    footer { padding: 10px 16px 18px; }
    .bubble { max-width: 86%; }
    .brand-name { font-size: 19px; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .05ms !important; }
    .stream { scroll-behavior: auto; }
    .caret { animation: none; }
  }
</style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <div class="sigil">
          <svg viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="9.2" stroke="#BFE0D6" stroke-width="1.6"/>
            <path d="M12 2.8a9.2 9.2 0 0 1 0 18.4Z" fill="#EAF3EF"/>
          </svg>
        </div>
        <div class="brand-text">
          <div class="brand-name">Mira</div>
          <div class="brand-sub">angetrieben von <b>Claude</b></div>
        </div>
      </div>
      <button class="reset" id="reset" title="Gespräch zurücksetzen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/>
        </svg>
        Neu
      </button>
    </header>

    <div class="stream" id="stream">
      <div class="stream-inner" id="streamInner"></div>
    </div>

    <footer>
      <div class="composer">
        <textarea id="input" rows="1" placeholder="Schreib Mira etwas…" autofocus></textarea>
        <button class="send" id="send" title="Senden" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14"/><path d="m13 6 6 6-6 6"/>
          </svg>
        </button>
      </div>
      <div class="hint"><kbd>Enter</kbd> senden &nbsp;·&nbsp; <kbd>Shift</kbd>+<kbd>Enter</kbd> neue Zeile</div>
    </footer>
  </div>

<script>
(function () {
  "use strict";

  // Welches Claude-Modell? Fuer mehr Qualitaet: "claude-opus-4-8" (kostet die Nutzer etwas mehr).
  var MODEL = "claude-sonnet-4-6";

  var SYSTEM_PROMPT = [
    "Du bist Mira, eine warmherzige, kluge und neugierige KI-Assistentin.",
    "Antworte immer in der Sprache, in der die Person dir schreibt.",
    "Du bist hilfsbereit, ehrlich und direkt - freundlich, aber nicht ueberschwaenglich oder kitschig.",
    "Halte deine Antworten klar und gut lesbar. Nutze Markdown (Listen, Fettdruck, Code) nur, wenn es die Lesbarkeit wirklich verbessert.",
    "Wenn du etwas nicht weisst, sag es ehrlich, statt zu raten."
  ].join(" ");

  var GREETING = "Hi, ich bin **Mira**. Frag mich, was du willst — ich bin hier zum Nachdenken, Erklären, Schreiben oder einfach Quatschen. Womit fangen wir an?";

  var history = []; // [{ role, content }] - nur echte Gespraechszuege
  var busy = false;

  var streamInner = document.getElementById("streamInner");
  var stream      = document.getElementById("stream");
  var input       = document.getElementById("input");
  var sendBtn     = document.getElementById("send");
  var resetBtn    = document.getElementById("reset");

  function renderMarkdown(text) {
    if (window.marked && window.DOMPurify) {
      try {
        marked.setOptions({ breaks: true, gfm: true });
        return DOMPurify.sanitize(marked.parse(text));
      } catch (e) {}
    }
    var esc = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    return esc.replace(/\n/g, "<br>");
  }

  function aiAvatar() {
    return '<div class="avatar ai"><svg viewBox="0 0 24 24" fill="none">' +
      '<circle cx="12" cy="12" r="9.2" stroke="#BFE0D6" stroke-width="1.6"/>' +
      '<path d="M12 2.8a9.2 9.2 0 0 1 0 18.4Z" fill="#EAF3EF"/></svg></div>';
  }
  function meAvatar() { return '<div class="avatar me">Du</div>'; }

  function addUserMessage(text) {
    var row = document.createElement("div");
    row.className = "row me";
    var bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    row.innerHTML = meAvatar();
    row.appendChild(bubble);
    streamInner.appendChild(row);
    scrollDown();
  }

  function addAiMessage(markdownText) {
    var row = document.createElement("div");
    row.className = "row ai";
    var bubble = document.createElement("div");
    bubble.className = "bubble rendered";
    bubble.innerHTML = renderMarkdown(markdownText);
    row.innerHTML = aiAvatar();
    row.appendChild(bubble);
    streamInner.appendChild(row);
    scrollDown();
    return bubble;
  }

  function startAiBubble() {
    var row = document.createElement("div");
    row.className = "row ai";
    var bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = '<span class="caret"></span>';
    row.innerHTML = aiAvatar();
    row.appendChild(bubble);
    streamInner.appendChild(row);
    scrollDown();
    return bubble;
  }

  function showThinking() {
    var row = document.createElement("div");
    row.className = "row ai";
    row.id = "thinking-row";
    row.innerHTML = aiAvatar() +
      '<div class="bubble"><div class="thinking"><span></span><span></span><span></span></div></div>';
    streamInner.appendChild(row);
    scrollDown();
  }
  function removeThinking() {
    var t = document.getElementById("thinking-row");
    if (t) t.remove();
  }

  function scrollDown() {
    requestAnimationFrame(function () { stream.scrollTop = stream.scrollHeight; });
  }

  function setBusy(state) {
    busy = state;
    input.disabled = state;
    sendBtn.disabled = state || input.value.trim() === "";
  }

  async function send() {
    var text = input.value.trim();
    if (!text || busy) return;

    setBusy(true);
    addUserMessage(text);
    history.push({ role: "user", content: text });
    input.value = "";
    autoGrow();
    showThinking();

    if (typeof puter === "undefined" || !puter.ai || !puter.ai.chat) {
      removeThinking();
      addAiMessage("Ich konnte den KI-Dienst nicht laden. Prüf bitte deine Internetverbindung und lade die Seite neu.");
      setBusy(false); input.focus(); return;
    }

    var messages = [{ role: "system", content: SYSTEM_PROMPT }];
    for (var i = 0; i < history.length; i++) messages.push(history[i]);

    var bubble = null;
    var full = "";

    try {
      var response = await puter.ai.chat(messages, { model: MODEL, stream: true });
      for await (var part of response) {
        var chunk = (part && part.text) ? part.text : "";
        if (!chunk) continue;
        if (!bubble) { removeThinking(); bubble = startAiBubble(); }
        full += chunk;
        bubble.textContent = full;
        var caret = document.createElement("span");
        caret.className = "caret";
        bubble.appendChild(caret);
        scrollDown();
      }
      if (!bubble) { removeThinking(); bubble = startAiBubble(); }
      if (!full) full = "Hmm, dazu fällt mir gerade nichts ein. Frag noch mal anders?";
      bubble.className = "bubble rendered";
      bubble.innerHTML = renderMarkdown(full);
      scrollDown();
      history.push({ role: "assistant", content: full });
    } catch (err) {
      removeThinking();
      var msg = (err && err.message) ? err.message : String(err);
      if (bubble) bubble.remove();
      addAiMessage(
        "Ups, da ist gerade etwas schiefgelaufen. Probier es gleich noch einmal.\n\n" +
        "*Falls beim ersten Mal ein kleines Anmeldefenster erscheint: kurz bestätigen — so bleibt der KI-Zugang kostenlos. (" + msg + ")*"
      );
      history.pop(); // gescheiterte Nutzerfrage wieder entfernen
    } finally {
      setBusy(false);
      input.focus();
    }
  }

  function autoGrow() {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 168) + "px";
  }

  function reset() {
    history = [];
    streamInner.innerHTML = "";
    addAiMessage(GREETING);
    input.value = "";
    autoGrow();
    setBusy(false);
    input.focus();
  }

  input.addEventListener("input", function () {
    autoGrow();
    sendBtn.disabled = busy || input.value.trim() === "";
  });
  input.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });
  sendBtn.addEventListener("click", send);
  resetBtn.addEventListener("click", reset);

  addAiMessage(GREETING);
  input.focus();
})();
</script>
</body>
</html>
